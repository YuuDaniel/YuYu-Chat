<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YuYu-Chat</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <span class="material-icons">dark_mode</span>
    </button>

    <div id="login-screen">
        <div class="login-card">
            <div class="login-logo"><img src="/static/favicon.png" alt="YuYu" style="width:52px;height:52px;object-fit:contain;"></div>
            <h2><span style="color: var(--primary);">YuYu</span>-Chat</h2>
            <span class="login-sub">Acesso corporativo interno</span>

            <p id="error-msg"></p>

            <div class="form-group">
                <label>Usuário de rede</label>
                <input type="text" id="usuario-ad" placeholder="Ex: j.silva" required autofocus>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha-ad" placeholder="Sua senha de rede" required onkeypress="handleLoginEnter(event)">
            </div>

            <button class="btn-login" id="btn-entrar" onclick="fazerLoginAPI()">Entrar</button>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        <header>
            <div class="header-info">
                <div class="header-avatar" id="header-avatar">--</div>
                <div>
                    <h2 id="welcome-msg">Bem-vindo</h2>
                    <small id="welcome-team"></small>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">Sair</button>
        </header>

        <div class="lista-header">
            <div class="title-and-filter">
                <h3 id="list-title">Carregando contatos...</h3>

                <div id="multi-select-container" class="multi-select-container" style="display: none;">
                    <button id="btn-filtro-equipe" onclick="toggleMenuFiltro()">Carteiras: Todas ▾</button>
                    <div id="menu-filtro-equipes" class="menu-filtro-oculto"></div>
                </div>
            </div>

            <button id="btn-broadcast" class="btn-broadcast-style" onclick="abrirModalBroadcast()" style="display: none;">
                📢 Enviar Aviso em Massa
            </button>
        </div>

        <div id="user-grid" class="user-grid"></div>
    </div>

    <div id="popups-container"></div>

    <script src="/static/script.js?v=2.4"></script>

    <!-- Avatar gerado diretamente no ws.onopen dentro do script.js -->

    <div id="modal-broadcast" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>📢 Nova Transmissão</h3>
            <p>Selecione os operadores que receberão o aviso:</p>

            <input type="text" id="pesquisa-broadcast" placeholder="🔍 Pesquisar operador..." onkeyup="filtrarBroadcast()">

            <label class="check-todos-container">
                <input type="checkbox" id="check-todos" onchange="toggleTodosBroadcast()"> Marcar Todos
            </label>

            <div id="lista-destinatarios" class="lista-destinatarios"></div>

            <textarea id="texto-broadcast" placeholder="Digite seu aviso aqui... Ele aparecerá com a tag [AVISO] para os operadores." rows="4"></textarea>

            <div class="modal-actions">
                <button class="btn-cancelar" onclick="fecharModalBroadcast()">Cancelar</button>
                <button class="btn-enviar" onclick="enviarBroadcast()">Enviar Aviso</button>
            </div>
        </div>
    </div>

</body>
</html>
